name = "mailfree"
# name = "mail-exhibit"
main = "src/server.js"
compatibility_date = "2024-01-01"
keep_vars=true

# D1 数据库绑定
[[d1_databases]]
binding = "TEMP_MAIL_DB"
database_name = "maill_free_db" #你的d1数据库名称
database_id = "eae22b56-2891-4c61-859a-d08ede71ef5d" # 你的database_id
# 登录会话过期时间（单位：天，默认7天）
# 环境变量
[vars]
# FORWARD_RULES="[{"prefix":"vip","email":"a@example.com"},{"prefix":"*","email":"example@qq.com"}]"
ADMIN_NAME="admin"
ADMIN_PASSWORD="Shun@9812"
GUEST_PASSWORD="guest"
JWT_TOKEN="qX3SpkZyitYFcJD4vd9Kt3pxp5E7ivnx"
JWT_TOKENGUEST_PASSWORD="dc2ManEgbuDhqwzf5f7brsLKK5EEpr4J"
SESSION_EXPIRE_DAYS="365"
MAIL_DOMAIN="shunge.de,shunge.cc,semmtv.com"
RESEND_API_KEY="re_7GCUGZ8w_NXm8dnkpuVdP3j1ynp5tdBbZ"



# 静态资源目录（Workers + Assets）
[assets]
directory = "public"
# 显式指定绑定名，确保在 Worker 中通过 env.ASSETS 可用
binding = "ASSETS"


# R2 存储桶绑定（用于保存完整 EML 内容）
[[r2_buckets]]
binding = "MAIL_EML"
bucket_name = "mail-eml"

